# ─────────────────────────────────────────────────────────
# Gestra Backend – Application Configuration
# ─────────────────────────────────────────────────────────

server.port=8080

# ── H2 Database (file-based agar data persisten) ─────────
spring.datasource.url=jdbc:h2:file:./data/gestradb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=gestra2026

# ── H2 Console (http://localhost:8080/h2-console) ────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Data Initialization ───────────────────────────────────
# Seed data dikelola oleh DataInitializer.java (CommandLineRunner)
# yang menggunakan PasswordEncoder Spring langsung — lebih aman.
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# ── JWT ───────────────────────────────────────────────────
gestra.jwt.secret=GestraSecretKey2026SuperSecureRandomStringForHMAC256BitsMinimum!
gestra.jwt.expiration-ms=86400000

# ── Multipart (upload foto) ───────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ───────────────────────────────────────────────
logging.level.com.gestra=DEBUG
logging.level.org.springframework.security=WARN
