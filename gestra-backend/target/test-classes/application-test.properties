# Konfigurasi khusus untuk environment test
# Pakai H2 in-memory agar tidak mencemari database file utama
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never

# JWT test secret
gestra.jwt.secret=TestSecretKeyForJUnitTestsOnly12345678901234567890
gestra.jwt.expiration-ms=3600000

logging.level.com.gestra=WARN
